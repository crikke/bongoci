name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build linux/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binaries
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist staging
          go build -trimpath -ldflags="-s -w" -o staging/ci ./cmd/ci
          go build -trimpath -ldflags="-s -w" -o staging/bongo-ls ./cmd/bongo-ls
          tar -czf "dist/bongoci-${VERSION}-linux-${GOARCH}.tar.gz" -C staging ci
          tar -czf "dist/bongo-ls-${VERSION}-linux-${GOARCH}.tar.gz" -C staging bongo-ls
      - name: Upload binaries (for vsix packaging)
        uses: actions/upload-artifact@v4
        with:
          name: bin-linux-${{ matrix.goarch }}
          path: staging/bongo-ls
          if-no-files-found: error
      - name: Upload release tarballs
        uses: actions/upload-artifact@v4
        with:
          name: tarballs-linux-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  package-vsix:
    name: Package VSIX (${{ matrix.vsce_target }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            vsce_target: linux-x64
          - goarch: arm64
            vsce_target: linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-bongo/package-lock.json
      - name: Download bongo-ls (${{ matrix.goarch }})
        uses: actions/download-artifact@v4
        with:
          name: bin-linux-${{ matrix.goarch }}
          path: vscode-bongo/bin
      - name: Make bongo-ls executable
        run: chmod +x vscode-bongo/bin/bongo-ls
      - name: Install dependencies
        working-directory: vscode-bongo
        run: npm ci
      - name: Sync extension version with tag
        working-directory: vscode-bongo
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading "v" and any pre-release suffix; vsce requires SemVer x.y.z
          clean="${VERSION#v}"
          clean="${clean%%-*}"
          npm version --no-git-tag-version --allow-same-version "${clean}"
      - name: Package extension
        working-directory: vscode-bongo
        run: |
          npx vsce package \
            --target ${{ matrix.vsce_target }} \
            --out "vscode-bongo-${{ github.ref_name }}-${{ matrix.vsce_target }}.vsix"
      - name: Upload vsix
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vsce_target }}
          path: vscode-bongo/*.vsix
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, package-vsix]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.vsix' \) -exec cp {} release/ \;
          cd release
          sha256sum * > checksums.txt
          ls -la
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
